<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicalLens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="fas fa-heartbeat"></i> ClinicalLens</span>
        <span class="text-white me-3">Bienvenido, {{ usuario.nombre }}</span>
        <a href="{% url 'usuarios:logout' %}" class="btn btn-outline-light btn-sm">Salir</a>
    </div>
</nav>
<div class="container mt-4">
    <h1>Dashboard</h1>
    <p class="text-muted">Panel de predicción de enfermedades crónicas</p>
    <div class="row g-3 mt-2">
        <div class="col-md-3">
            <div class="card bg-primary text-white text-center p-3">
                <i class="fas fa-tint fa-2x mb-2"></i>
                <h6>Diabetes</h6>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-danger text-white text-center p-3">
                <i class="fas fa-heart fa-2x mb-2"></i>
                <h6>Cardiovascular</h6>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning text-white text-center p-3">
                <i class="fas fa-weight fa-2x mb-2"></i>
                <h6>Metabólico</h6>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-info text-white text-center p-3">
                <i class="fas fa-lungs fa-2x mb-2"></i>
                <h6>Renal</h6>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
